name: Deploy homepage

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build with jemdoc
        run: python3 ./jemdoc -c mysite.conf index.jemdoc papers.jemdoc grants.jemdoc services.jemdoc

      - name: Stage site for upload
        run: |
          mkdir _site
          cp index.html papers.html grants.html services.html _site/
          cp index.jemdoc papers.jemdoc grants.jemdoc services.jemdoc _site/
          cp -r css photos _site/
          cp CNAME robots.txt sitemap.xml baidu_verify_codeva-osQ82ZZEqw.html _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
